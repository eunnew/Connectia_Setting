<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>답변하지 못한 질문</title>
  <link rel="stylesheet" href="design-system.css" />
  <style>
    body {
      min-height: 100vh;
      padding-bottom: 60px;
    }

    .page {
      max-width: 390px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 48px 0 6px;
    }

    .btn-back {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: var(--foreground);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--foreground);
      letter-spacing: -0.02em;
    }

    .header-sub {
      font-size: 13px;
      color: var(--muted-foreground);
      margin-bottom: 20px;
      padding-left: 30px;
    }

    /* ── List ── */
    .q-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 0.25rem);
      padding: 18px 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .q-alert-icon {
      width: 18px;
      height: 18px;
      border-radius: 9999px;
      background: oklch(65% .22 25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .q-body {
      flex: 1;
      min-width: 0;
    }

    .q-question {
      font-size: 16px;
      font-weight: 600;
      color: var(--foreground);
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .q-meta {
      font-size: 12px;
      color: var(--muted-foreground);
      margin-bottom: 14px;
    }

    .btn-update {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-update:hover {
      background: var(--accent);
    }

    .btn-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-view-all {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted-foreground);
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .btn-view-all:hover {
      background: var(--accent);
      color: var(--foreground);
    }

    .btn-dismiss {
      flex-shrink: 0;
      align-self: flex-start;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted-foreground);
      padding: 2px;
      display: flex;
      align-items: center;
      border-radius: 9999px;
      transition: color 0.15s, background 0.15s;
    }

    .btn-dismiss:hover {
      color: var(--foreground);
      background: var(--accent);
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="header">
      <button class="btn-back" onclick="history.back()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <h1>답변하지 못한 질문</h1>
    </div>
    <p class="header-sub">관련 자료를 추가하면 다음엔 답할 수 있어요</p>

    <div class="q-list">

      <div class="q-card">
        <div class="q-alert-icon">!</div>
        <div class="q-body">
          <div class="q-question">요금 정책이 어떻게 되나요?</div>
          <div class="q-meta">김하나 · 2025.04.19 오후 3:12</div>
          <div class="btn-actions">
            <button class="btn-update">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12l7-7 7 7" />
              </svg>
              자료 업데이트
            </button>
            <a href="conversations.html" class="btn-view-all">대화 전체보기</a>
          </div>
        </div>
        <button class="btn-dismiss" onclick="this.closest('.q-card').remove()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div class="q-card">
        <div class="q-alert-icon">!</div>
        <div class="q-body">
          <div class="q-question">환불 신청은 어디서 하나요?</div>
          <div class="q-meta">익명 · 2025.04.18 오전 11:45</div>
          <div class="btn-actions">
            <button class="btn-update">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12l7-7 7 7" />
              </svg>
              자료 업데이트
            </button>
            <a href="conversations.html" class="btn-view-all">대화 전체보기</a>
          </div>
        </div>
        <button class="btn-dismiss" onclick="this.closest('.q-card').remove()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>

    </div>
  </div>
</body>

</html>
